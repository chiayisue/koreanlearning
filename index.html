<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sue's Korean Hub</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --error: #eb4d4b;
            --warning: #f39c12;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3436;
            --chat-npc: #e9ecef;
            --chat-user: #4a90e2;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
            position: fixed; width: 100%;
        }
        
        .app-container { 
            width: 100%; max-width: 500px; 
            height: 100%; 
            display: flex; flex-direction: column; 
            padding: 15px; 
        }
        
        /* 首頁樣式 */
        #homeView { flex: 1; overflow-y: auto; padding-top: 10px; padding-bottom: 20px; }
        .header { text-align: left; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin: 0; color: var(--primary); }
        .header p { color: #636e72; margin: 5px 0 0; }
        
        .mode-toggle-btn {
            width: 100%; background: #eef2f7; color: var(--primary); border: 2px solid var(--primary);
            padding: 12px; border-radius: 15px; font-size: 16px; font-weight: 700;
            cursor: pointer; margin-bottom: 25px; transition: 0.3s;
        }
        .mode-toggle-btn:active { transform: scale(0.98); }

        .menu-grid { display: grid; gap: 15px; }
        .menu-item {
            background: var(--card); padding: 25px; border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-item:active { transform: scale(0.97); }
        .menu-item h3 { margin: 0; font-size: 18px; }
        
        #mistakeBtn { background: #fff5f5; border: 1px solid #ffcccc; display: none; }
        #mistakeBtn h3 { color: var(--error); }
        .mistake-badge { background: var(--error); color: white; padding: 2px 8px; border-radius: 12px; font-size: 14px; margin-left: 10px; }

        /* 測驗與情境介面 */
        #quizView, #scenarioMenuView, #rolePlayView { display: none; flex-direction: column; height: 100%; }
        #quizView { text-align: center; }
        #scenarioMenuView { padding-top: 20px; }
        
        .progress-bar { width: 100%; height: 6px; background: #dfe6e9; border-radius: 3px; margin-bottom: 20px; flex-shrink: 0; }
        #progressFill { width: 0%; height: 100%; background: var(--primary); border-radius: 3px; transition: 0.3s; }
        .question-card { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; min-height: 0; position: relative; }
        .meaning-text { font-size: 22px; font-weight: 700; color: #2d3436; margin-bottom: 15px; line-height: 1.4; }
        .correct-answer { font-size: 32px; font-weight: 800; color: var(--primary); margin-top: 10px; visibility: hidden; line-height: 1.3; word-break: keep-all; }
        
        .chat-header { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--primary); flex-shrink: 0; }
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 10px; margin-bottom: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; }
        .bubble.npc { background: var(--chat-npc); color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble.npc .hint { font-size: 12px; color: #666; margin-top: 4px; border-top: 1px solid #ddd; padding-top: 4px; }
        .bubble.player { background: var(--chat-user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .task-card { background: #eef2f7; padding: 12px; border-radius: 12px; text-align: center; flex-shrink: 0; margin-bottom: 10px; border: 2px solid var(--primary); position: relative; }
        .task-label { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        .task-content { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 5px;}
        .task-korean-hint { font-size: 22px; font-weight: 800; color: var(--primary); display: none; }

        /* 💡 文法提示按鈕與彈出視窗 */
        .grammar-btn { 
            background: #fff3cd; color: #856404; border: 1px solid #ffeeba; 
            padding: 6px 15px; border-radius: 20px; font-size: 14px; font-weight: 700; 
            cursor: pointer; display: none; margin: 0 auto 15px auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; line-height: 1.6; font-size: 16px; color: #333;
        }
        .modal-title { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
        .close-modal {
            position: absolute; top: 20px; right: 20px; background: none; border: none;
            font-size: 24px; cursor: pointer; color: #999; line-height: 1; padding: 0;
        }

        .feedback-area { min-height: 60px; margin: 10px 0; font-weight: 600; font-size: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; text-align: center; line-height: 1.5; }
        
        .typo-highlight {
            color: var(--error); font-weight: 800; background-color: #ffeaea; padding: 0 4px;
            border-radius: 4px; text-decoration: underline; text-decoration-color: var(--error); margin: 0 1px;
        }

        .controls { padding-bottom: 15px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .mic-btn-container { position: relative; display: flex; justify-content: center; height: 90px; margin-bottom: 10px; width: 100%; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4); transition: background-color 0.3s; }
        .mic-btn.recording { background: var(--error); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(235, 77, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); } }

        .spelling-container { 
            display: none; width: 100%; flex-direction: column; align-items: center; gap: 8px; 
            margin-bottom: 5px; padding: 12px; border-radius: 15px; background: white; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05); border: 1px solid #e1e8ed;
        }
        .spelling-hint { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 2px; text-align: center; }
        .spelling-input { width: 100%; max-width: 350px; padding: 12px; border-radius: 10px; border: 2px solid var(--primary); font-size: 16px; text-align: center; font-family: 'Pretendard', sans-serif; outline: none; }
        .spelling-input:focus { box-shadow: 0 0 8px rgba(74, 144, 226, 0.3); }

        .action-btn { background: var(--text); color: white; border: none; padding: 12px 40px; border-radius: 25px; font-size: 16px; font-weight: 600; display: none; width: 80%; max-width: 250px; cursor: pointer; }
        .action-btn.submit-btn { display: inline-block; background: var(--primary); width: 100%; max-width: 350px; border-radius: 10px; }
        
        .play-btn { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; display: none; font-size: 14px; font-weight: 600; margin-left: auto; margin-right: auto; }
        .back-home { margin-top: 15px; background: none; border: none; color: #b2bec3; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

<div class="modal-overlay" id="grammarModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeGrammarModal()">×</button>
        <div class="modal-title">📖 文法解析</div>
        <div id="grammarContent">這裡會顯示文法內容</div>
    </div>
</div>

<div class="app-container">
    <div id="homeView">
        <div class="header">
            <h1>Sue 的韓文學習中心</h1>
            <p>專注於口說與日常應用</p>
        </div>
        
        <button id="modeToggleBtn" class="mode-toggle-btn" onclick="toggleInputMode()">
            🔄 目前模式：🗣️ 口說辨識
        </button>

        <div class="menu-grid">
            <div class="menu-item" style="border: 2px solid var(--primary);" onclick="showScenarioMenu()">
                <h3>🎭 情境對話</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('詞彙')">
                <h3>📚 核心詞彙</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('文法')">
                <h3>⚙️ 語法辨析</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('句型')">
                <h3>💬 實用長句</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('全部')">
                <h3>🎲 全部挑戰</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" id="mistakeBtn" onclick="startMistakeQuiz()">
                <h3>🔥 易錯弱點複習 <span id="mistakeCount" class="mistake-badge">0</span></h3><span class="icon">➔</span>
            </div>
        </div>
    </div>

    <div id="quizView">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div class="question-card">
            <div id="catTag" style="font-size: 14px; color: var(--primary); margin-bottom: 8px; font-weight: 600;"></div>
            <button id="quizGrammarBtn" class="grammar-btn" onclick="openGrammarModal('quiz')">💡 查看文法提示</button>
            <div class="meaning-text" id="targetMeaning">準備好...</div>
            <div class="correct-answer" id="targetKorean"></div>
            <button id="repeatBtn" class="play-btn" onclick="playAudio()">🔊 聆聽標準發音</button>
        </div>
        <div class="feedback-area" id="quizFeedback"></div>
        <div class="controls">
            <div class="mic-btn-container" id="quizMicContainer">
                <button class="mic-btn" id="quizMicBtn">🎤</button>
            </div>
            <div class="spelling-container" id="quizSpellContainer">
                <div class="spelling-hint" id="quizSpellHint">✏️ 準備中...</div>
                <input type="text" id="quizSpellInput" class="spelling-input" placeholder="請輸入韓文..." autocomplete="off">
                <button class="action-btn submit-btn" onclick="checkSpelling('quiz')">送出答案</button>
            </div>
            <button class="action-btn" id="nextQuizBtn" onclick="nextQuestion()">下一題 ➔</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <div id="scenarioMenuView">
        <div class="header">
            <h1>選擇對話情境</h1>
        </div>
        <div class="menu-grid" id="scenarioList"></div>
        <button class="back-home" onclick="goHome()" style="margin-top: auto;">回首頁</button>
    </div>

    <div id="rolePlayView">
        <div class="chat-header" id="rpTitle">情境標題</div>
        
        <div class="task-card">
            <button id="rpGrammarBtn" class="grammar-btn" onclick="openGrammarModal('roleplay')">💡 查看文法提示</button>
            <div class="task-label">📍 輪到你說：</div>
            <div class="task-content" id="rpTaskHint">準備中...</div>
            <div class="task-korean-hint" id="rpTaskKorean">답변</div>
            <button id="rpRepeatBtn" class="play-btn" style="margin-top: 5px;" onclick="playRpAudio()">🔊 聽正確讀音</button>
        </div>

        <div class="chat-box" id="chatBox"></div>
        <div class="feedback-area" id="rpFeedback"></div>

        <div class="controls">
            <div class="mic-btn-container" id="rpMicContainer">
                <button class="mic-btn" id="rpMicBtn">🎤</button>
            </div>
            <div class="spelling-container" id="rpSpellContainer">
                <div class="spelling-hint" id="rpSpellHint">✏️ 準備中...</div>
                <input type="text" id="rpSpellInput" class="spelling-input" placeholder="請輸入對話回覆..." autocomplete="off">
                <button class="action-btn submit-btn" onclick="checkSpelling('roleplay')">送出對話</button>
            </div>
            <button class="action-btn" id="rpNextBtn" onclick="nextRolePlayLine()">繼續對話 ➔</button>
            <button class="action-btn" id="rpFinishBtn" onclick="goHome()">完成對話 🏠</button>
            <button class="back-home" onclick="goHome()">結束並回首頁</button>
        </div>
    </div>
</div>

<script>
    // --- 擴充題庫：加入 grammarNote 欄位 ---
    const allData = [
        { cat: "詞彙", ko: "퇴직", en: "退休 (官方/合約到期)" },
        { cat: "詞彙", ko: "퇴사", en: "離職 (個人職涯變更)" },
        { cat: "詞彙", ko: "퇴근", en: "下班 (今日工作結束)" },
        { cat: "詞彙", ko: "옮기다", en: "搬移 / 換 (例如：換公司)" },
        
        // 帶有文法提示的特訓題
        { cat: "文法", ko: "퇴직할 때", en: "退休的時候", grammarNote: "<b>-(으)ㄹ 때 (表示「當...的時候」)</b><br><br>• 動詞字幹沒有收音時，接 -ㄹ 때。<br>• 예: 퇴직하 + ㄹ 때 ➔ 퇴직할 때" },
        { cat: "文法", ko: "직전이라서", en: "因為是前夕", grammarNote: "<b>이다：韓文的「是」<br>(이)라서：接在名詞後面，表示原因或理由。</b><br><br>• 名詞<b>有</b>收音：用 이라서<br>• 예: 직전 (有收音) ➔ 직전이라서" },
        { cat: "文法", ko: "친구라서", en: "因為是朋友", grammarNote: "<b>이다：韓文的「是」<br>(이)라서：接在名詞後面，表示原因或理由。</b><br><br>• 名詞<b>無</b>收音：用 라서<br>• 예: 친구 (無收音) ➔ 친구라서" },
        { cat: "句型", ko: "퇴사 직전이라서 조금 바빠요", en: "因為是離職前夕，所以有點忙。", grammarNote: "<b>(이)라서 (因為是...)</b><br>직전 (前夕) 有收音，所以加上 이라서。" },

        { cat: "文法", ko: "해야 돼요", en: "必須做 / 應該做" },
        { cat: "文法", ko: "해도 돼요", en: "可以做 / 做...也沒關係" },
        { cat: "文法", ko: "먹는 음식", en: "「正在吃」的食物" },
        { cat: "文法", ko: "먹을 음식", en: "「要吃」的食物" },
        { cat: "句型", ko: "곧 퇴사해서 안 바빠요", en: "「因為」很快就要離職了，所以不忙。" },
        { cat: "句型", ko: "다음 달에 뉴욕에 갈 거예요", en: "下個月我要去紐約" },
        { cat: "句型", ko: "제가 필요 없는 것을 다 팔았어요", en: "我把不需要的東西都賣掉了" },
        { cat: "句型", ko: "처음으로 한국어로 대화해서 긴장했어요", en: "因為是第一次用韓文對話，所以很緊張。" },
        { cat: "句型", ko: "매일 30분 정도 운동하는 습관을 가지고 싶어요", en: "我想養成每天運動30分鐘左右的習慣。" },
        { cat: "句型", ko: "운동을 한 후에 에너지가 더 좋아졌어요", en: "運動之後，精神變得更好了。" }
    ];

    const scenarios = [
        {
            id: "cafe",
            title: "☕️ 獨立咖啡廳點單",
            desc: "在首爾的咖啡廳點一杯飲料並確認內用",
            lines: [
                { npcKo: "어서 오세요. 주문하시겠어요?", npcZh: "歡迎光臨，請問要點餐嗎？", userTaskZh: "請給我一杯冰美式。", userKo: "아이스 아메리카노 한 잔 주세요" },
                { npcKo: "드시고 가시나요?", npcZh: "請問內用嗎？", userTaskZh: "對，我要內用。", userKo: "네 먹고 갈게요" },
                { npcKo: "결제 도와드리겠습니다.", npcZh: "幫您結帳。", userTaskZh: "請用卡片結帳。", userKo: "카드로 계산해 주세요" }
            ]
        },
        {
            id: "moving_prep",
            title: "📦 離職與搬家前夕",
            desc: "和朋友聊聊最近的忙碌狀態與未來的計畫",
            lines: [
                { npcKo: "요즘 많이 바쁘죠? 짐 싸기는 다 끝냈어요?", npcZh: "最近很忙吧？行李都打包完了嗎？", userTaskZh: "因為是離職前夕，所以有點忙。", userKo: "퇴사 직전이라서 조금 바빠요", grammarNote: "<b>(이)라서 (因為是...)</b><br>직전 (前夕) 有收音，所以加上 이라서。" },
                { npcKo: "그렇군요. 앞으로 계획이 어떻게 돼요?", npcZh: "原來如此。接下來有什麼計畫呢？", userTaskZh: "父母退休的時候，打算搬回台灣。", userKo: "부모님이 퇴직할 때 대만으로 돌아갈 거예요", grammarNote: "<b>-(으)ㄹ 때 (表示「當...的時候」)</b><br>퇴직하 沒有收音，所以接 ㄹ 때。" },
                { npcKo: "대만 생활이 정말 기대되겠네요!", npcZh: "一定很期待台灣的生活吧！", userTaskZh: "因為是好久沒回去的家，所以很期待。", userKo: "오랜만의 집이라서 기대돼요", grammarNote: "<b>(이)라서 (因為是...)</b><br>집 (家) 有收音，所以加上 이라서。" }
            ]
        }
    ];

    let currentSet = [];
    let idx = 0;
    let mistakeBank = [];
    let currentScenario = null;
    let currentLineIdx = 0;
    let recognitionMode = 'quiz';
    let inputMode = 'voice';

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ko-KR';
    recognition.continuous = false;

    // --- 文法 Modal 控制 ---
    function openGrammarModal(mode) {
        let note = "";
        if (mode === 'quiz') {
            note = currentSet[idx].grammarNote;
        } else if (mode === 'roleplay') {
            note = currentScenario.lines[currentLineIdx].grammarNote;
        }
        
        if (note) {
            document.getElementById('grammarContent').innerHTML = note;
            document.getElementById('grammarModal').style.display = 'flex';
        }
    }

    function closeGrammarModal() {
        document.getElementById('grammarModal').style.display = 'none';
    }

    // 點擊背景關閉 Modal
    document.getElementById('grammarModal').addEventListener('click', function(e) {
        if (e.target === this) closeGrammarModal();
    });

    // --- Diff 演算法 ---
    function generateDiffHtml(inputStr, targetStr) {
        const m = inputStr.length;
        const n = targetStr.length;
        const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

        for (let i = 1; i <= m; i++) {
            for (let j = 1; j <= n; j++) {
                if (inputStr[i - 1] === targetStr[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
                else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }

        let i = m, j = n, diffHtml = "";
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && inputStr[i - 1] === targetStr[j - 1]) {
                diffHtml = inputStr[i - 1] + diffHtml; i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) { j--;
            } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                diffHtml = `<span class="typo-highlight">${inputStr[i - 1]}</span>` + diffHtml; i--;
            }
        }
        return diffHtml;
    }

    function toggleInputMode() {
        inputMode = inputMode === 'voice' ? 'spelling' : 'voice';
        const btn = document.getElementById('modeToggleBtn');
        if (inputMode === 'voice') {
            btn.innerHTML = '🔄 目前模式：🗣️ 口說辨識';
            btn.style.background = '#eef2f7'; btn.style.color = 'var(--primary)';
        } else {
            btn.innerHTML = '🔄 目前模式：⌨️ 鍵盤拼字';
            btn.style.background = 'var(--primary)'; btn.style.color = 'white';
        }
        
        if (document.getElementById('quizView').style.display === 'flex') setupInputUI('quiz');
        else if (document.getElementById('rolePlayView').style.display === 'flex') setupInputUI('rp');
    }

    function setupInputUI(viewPrefix) {
        const micContainer = document.getElementById(`${viewPrefix}MicContainer`);
        const spellContainer = document.getElementById(`${viewPrefix}SpellContainer`);
        const spellInput = document.getElementById(`${viewPrefix}SpellInput`);
        const nextBtn = document.getElementById(`${viewPrefix === 'quiz' ? 'nextQuizBtn' : 'rpNextBtn'}`);
        
        nextBtn.style.display = 'none';

        if (inputMode === 'voice') {
            micContainer.style.display = 'flex'; spellContainer.style.display = 'none';
        } else {
            micContainer.style.display = 'none'; spellContainer.style.display = 'flex';
            spellInput.value = '';
            setTimeout(() => { spellInput.focus(); spellInput.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }
    }

    document.getElementById('quizSpellInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkSpelling('quiz'); });
    document.getElementById('rpSpellInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkSpelling('roleplay'); });

    function playAudio(text) { speak(text || document.getElementById('targetKorean').innerText); }
    function playRpAudio(text) { speak(text || document.getElementById('rpTaskKorean').innerText); }
    function speak(text) {
        if (!text) return; window.speechSynthesis.cancel(); 
        const utter = new SpeechSynthesisUtterance(text); utter.lang = 'ko-KR'; utter.rate = 0.85;
        window.speechSynthesis.speak(utter);
    }

    function hideAllViews() { ['homeView', 'quizView', 'scenarioMenuView', 'rolePlayView'].forEach(id => { document.getElementById(id).style.display = 'none'; }); }

    function goHome() {
        hideAllViews(); document.getElementById('homeView').style.display = 'block';
        const mistakeBtn = document.getElementById('mistakeBtn');
        if (mistakeBank.length > 0) { mistakeBtn.style.display = 'flex'; document.getElementById('mistakeCount').innerText = mistakeBank.length; } 
        else { mistakeBtn.style.display = 'none'; }
    }

    function startQuiz(type) {
        recognitionMode = 'quiz';
        currentSet = (type === '全部') ? [...allData] : allData.filter(q => q.cat === type);
        currentSet.sort(() => Math.random() - 0.5); idx = 0;
        hideAllViews(); document.getElementById('quizView').style.display = 'flex'; showQuizQuestion();
    }

    function startMistakeQuiz() {
        if (mistakeBank.length === 0) return;
        recognitionMode = 'quiz'; currentSet = [...mistakeBank]; currentSet.sort(() => Math.random() - 0.5); idx = 0;
        mistakeBank = []; hideAllViews(); document.getElementById('quizView').style.display = 'flex'; showQuizQuestion();
    }

    function showQuizQuestion() {
        const q = currentSet[idx];
        document.getElementById('catTag').innerText = q.cat;
        document.getElementById('targetMeaning').innerText = q.en; 
        document.getElementById('targetKorean').innerText = q.ko;
        document.getElementById('targetKorean').style.visibility = 'hidden';
        document.getElementById('quizFeedback').innerText = "";
        document.getElementById('progressFill').style.width = `${((idx) / currentSet.length) * 100}%`;
        document.getElementById('repeatBtn').style.display = 'none';
        document.getElementById('quizSpellHint').innerText = "✏️ 翻譯：" + q.en;
        
        // 判斷是否顯示文法按鈕
        const grammarBtn = document.getElementById('quizGrammarBtn');
        if (q.grammarNote) grammarBtn.style.display = 'inline-block';
        else grammarBtn.style.display = 'none';

        setupInputUI('quiz');
    }

    function nextQuestion() {
        idx++; if (idx < currentSet.length) showQuizQuestion(); else { alert("太棒了！本階段練習完成！"); goHome(); }
    }

    function showScenarioMenu() {
        hideAllViews(); document.getElementById('scenarioMenuView').style.display = 'flex';
        const listContainer = document.getElementById('scenarioList'); listContainer.innerHTML = '';
        scenarios.forEach((s, index) => {
            const item = document.createElement('div'); item.className = 'menu-item'; item.onclick = () => startRolePlay(index);
            item.innerHTML = `<div><h3>${s.title}</h3><p style="margin:5px 0 0; font-size:12px; color:#666;">${s.desc}</p></div><span class="icon">💬</span>`;
            listContainer.appendChild(item);
        });
    }

    function startRolePlay(scenarioIndex) {
        recognitionMode = 'roleplay'; currentScenario = scenarios[scenarioIndex]; currentLineIdx = 0;
        hideAllViews(); document.getElementById('rolePlayView').style.display = 'flex';
        document.getElementById('rpTitle').innerText = currentScenario.title; document.getElementById('chatBox').innerHTML = ''; 
        playCurrentNpcLine();
    }

    function playCurrentNpcLine() {
        const lineData = currentScenario.lines[currentLineIdx];
        const chatBox = document.getElementById('chatBox');
        const bubble = document.createElement('div'); bubble.className = 'bubble npc';
        bubble.innerHTML = `${lineData.npcKo}<div class="hint">${lineData.npcZh}</div>`;
        chatBox.appendChild(bubble); chatBox.scrollTop = chatBox.scrollHeight; speak(lineData.npcKo);

        document.getElementById('rpTaskHint').innerText = lineData.userTaskZh;
        document.getElementById('rpTaskKorean').innerText = lineData.userKo;
        document.getElementById('rpTaskKorean').style.display = 'none'; 
        document.getElementById('rpRepeatBtn').style.display = 'none';
        document.getElementById('rpFeedback').innerText = "";
        document.getElementById('rpFinishBtn').style.display = 'none';
        document.getElementById('rpSpellHint').innerText = "✏️ 請回答：" + lineData.userTaskZh;

        // 判斷是否顯示文法按鈕
        const grammarBtn = document.getElementById('rpGrammarBtn');
        if (lineData.grammarNote) grammarBtn.style.display = 'inline-block';
        else grammarBtn.style.display = 'none';

        setupInputUI('rp');
    }

    function nextRolePlayLine() {
        currentLineIdx++; if (currentLineIdx < currentScenario.lines.length) playCurrentNpcLine();
        else {
            const chatBox = document.getElementById('chatBox');
            const bubble = document.createElement('div'); bubble.className = 'bubble npc';
            bubble.innerHTML = `🎉 對話完成！做得好！`; chatBox.appendChild(bubble); chatBox.scrollTop = chatBox.scrollHeight;
            
            document.querySelector('.task-card').style.display = 'none';
            document.getElementById('rpMicContainer').style.display = 'none';
            document.getElementById('rpSpellContainer').style.display = 'none';
            document.getElementById('rpNextBtn').style.display = 'none';
            document.getElementById('rpFinishBtn').style.display = 'inline-block';
        }
    }

    function processAnswer(inputRaw, mode) {
        const cleanInput = inputRaw.replace(/[\s.,?!]/g, "");
        if (mode === 'quiz') {
            const currentQ = currentSet[idx]; const targetRaw = currentQ.ko; const targetClean = targetRaw.replace(/[\s.,?!]/g, "");
            
            if (cleanInput === targetClean) {
                document.getElementById('quizFeedback').innerHTML = `✅ 完美！`; document.getElementById('quizFeedback').style.color = 'var(--success)';
                document.getElementById('targetKorean').style.visibility = 'visible';
                document.getElementById('quizMicContainer').style.display = 'none'; document.getElementById('quizSpellContainer').style.display = 'none';
                document.getElementById('nextQuizBtn').style.display = 'inline-block'; document.getElementById('repeatBtn').style.display = 'block';
                document.getElementById('progressFill').style.width = `${((idx + 1) / currentSet.length) * 100}%`;
            } else {
                const highlightedDiff = generateDiffHtml(inputRaw, targetRaw);
                document.getElementById('quizFeedback').style.color = '#333';
                document.getElementById('quizFeedback').innerHTML = `<span style="color:var(--error);">❌ 錯誤，請注意紅字部分：</span><br><div style="font-size:18px; margin-top:8px; font-weight:700; letter-spacing:0.5px;">"${highlightedDiff}"</div>`;
                document.getElementById('targetKorean').style.visibility = 'visible'; document.getElementById('repeatBtn').style.display = 'block';
                playAudio(targetRaw); if (!mistakeBank.some(item => item.ko === currentQ.ko)) mistakeBank.push(currentQ);
            }
        } 
        else if (mode === 'roleplay') {
            const targetRaw = currentScenario.lines[currentLineIdx].userKo; const targetClean = targetRaw.replace(/[\s.,?!]/g, "");
            
            if (cleanInput === targetClean) {
                document.getElementById('rpFeedback').innerHTML = "✅ 回覆成功！"; document.getElementById('rpFeedback').style.color = 'var(--success)';
                document.getElementById('rpTaskKorean').style.display = 'block';
                const chatBox = document.getElementById('chatBox'); const bubble = document.createElement('div');
                bubble.className = 'bubble player'; bubble.innerText = inputRaw; chatBox.appendChild(bubble); chatBox.scrollTop = chatBox.scrollHeight;
                document.getElementById('rpMicContainer').style.display = 'none'; document.getElementById('rpSpellContainer').style.display = 'none';
                document.getElementById('rpNextBtn').style.display = 'inline-block';
            } else {
                const highlightedDiff = generateDiffHtml(inputRaw, targetRaw);
                document.getElementById('rpFeedback').style.color = '#333';
                document.getElementById('rpFeedback').innerHTML = `<span style="color:var(--error);">❌ 錯誤，請注意紅字部分：</span><br><div style="font-size:18px; margin-top:8px; font-weight:700; letter-spacing:0.5px;">"${highlightedDiff}"</div>`;
                document.getElementById('rpTaskKorean').style.display = 'block'; document.getElementById('rpRepeatBtn').style.display = 'inline-block';
                playRpAudio(targetRaw); 
            }
        }
    }

    function checkSpelling(mode) {
        const inputEl = mode === 'quiz' ? document.getElementById('quizSpellInput') : document.getElementById('rpSpellInput');
        const answer = inputEl.value.trim(); if (!answer) return; processAnswer(answer, mode);
    }

    document.getElementById('quizMicBtn').addEventListener('click', startListening);
    document.getElementById('rpMicBtn').addEventListener('click', startListening);

    function startListening(e) {
        try {
            recognition.start(); e.target.classList.add('recording');
            const feedbackEl = recognitionMode === 'quiz' ? document.getElementById('quizFeedback') : document.getElementById('rpFeedback');
            feedbackEl.innerHTML = "正在聆聽..."; feedbackEl.style.color = 'var(--text)';
        } catch (err) { console.log("語音辨識運行中"); }
    }

    recognition.onresult = (event) => {
        const result = event.results[0][0].transcript.trim();
        document.querySelectorAll('.mic-btn').forEach(btn => btn.classList.remove('recording')); processAnswer(result, recognitionMode);
    };

    recognition.onerror = () => {
        document.querySelectorAll('.mic-btn').forEach(btn => btn.classList.remove('recording'));
        const feedbackEl = recognitionMode === 'quiz' ? document.getElementById('quizFeedback') : document.getElementById('rpFeedback');
        feedbackEl.innerHTML = "沒聽清楚，請重試。"; feedbackEl.style.color = 'var(--error)';
    };
</script>
</body>
</html>
