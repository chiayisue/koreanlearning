<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Bon Voyage</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --error: #eb4d4b;
            --warning: #f39c12;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3436;
            --chat-npc: #e9ecef;
            --chat-user: #4a90e2;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            height: 100dvh; overflow: hidden;
            position: fixed; width: 100%;
        }
        
        .app-container { 
            width: 100%; max-width: 500px; 
            height: 100%; 
            display: flex; flex-direction: column; 
            padding: 15px; 
        }
        
        /* 首頁樣式 */
        #homeView { flex: 1; overflow-y: auto; padding-top: 10px; padding-bottom: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .header-text h1 { font-size: 26px; margin: 0; color: var(--primary); }
        .header-text p { color: #636e72; margin: 2px 0 0; font-size: 14px; }
        
        .mode-toggle-btn {
            width: 100%; background: #eef2f7; color: var(--primary); border: 2px solid var(--primary);
            padding: 12px; border-radius: 15px; font-size: 16px; font-weight: 700;
            cursor: pointer; margin-bottom: 25px; transition: 0.3s;
        }

        .menu-grid { display: grid; gap: 15px; }
        .menu-item {
            background: var(--card); padding: 25px; border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-item:active { transform: scale(0.97); }
        
        #mistakeBtn { background: #fff5f5; border: 1px solid #ffcccc; display: none; }
        .mistake-badge { background: var(--error); color: white; padding: 2px 8px; border-radius: 12px; font-size: 14px; margin-left: 10px; }

        /* 介面佈局 */
        #quizView, #scenarioMenuView, #rolePlayView { display: none; flex-direction: column; height: 100%; }
        
        .progress-bar { width: 100%; height: 6px; background: #dfe6e9; border-radius: 3px; margin-bottom: 20px; flex-shrink: 0; }
        #progressFill { width: 0%; height: 100%; background: var(--primary); border-radius: 3px; transition: 0.3s; }
        
        .question-card { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; min-height: 0; position: relative; text-align: center; }
        .meaning-text { font-size: 24px; font-weight: 700; color: #2d3436; margin-bottom: 15px; line-height: 1.4; }
        .correct-answer { font-size: 30px; font-weight: 800; color: var(--primary); margin-top: 10px; visibility: hidden; line-height: 1.3; }
        
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 10px; margin-bottom: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .bubble.npc { background: var(--chat-npc); align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble.npc .hint { font-size: 12px; color: #666; margin-top: 4px; border-top: 1px solid #ddd; padding-top: 4px; }
        .bubble.player { background: var(--chat-user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .task-card { background: #eef2f7; padding: 12px; border-radius: 12px; text-align: center; border: 2px solid var(--primary); margin-bottom: 10px; position: relative; }
        .task-label { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
        .task-content { font-size: 18px; font-weight: 700; color: #333; }

        /* 文法彈窗 */
        .grammar-btn { 
            background: #fff3cd; color: #856404; border: 1px solid #ffeeba; 
            padding: 6px 15px; border-radius: 20px; font-size: 14px; font-weight: 700; 
            cursor: pointer; display: none; margin: 0 auto 10px auto;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }

        /* 回饋與紅字標記 */
        .feedback-area { min-height: 70px; margin: 5px 0; font-weight: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; line-height: 1.5; }
        .typo-highlight { color: var(--error); background-color: #ffeaea; padding: 0 2px; border-radius: 4px; text-decoration: underline; font-weight: 800; }

        .controls { padding-bottom: 15px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4); }
        .mic-btn.recording { background: var(--error); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(235, 77, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); } }

        .spelling-container { display: none; width: 100%; flex-direction: column; align-items: center; gap: 8px; padding: 12px; background: white; border-radius: 15px; border: 1px solid #e1e8ed; }
        .spelling-hint { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 2px; text-align: center; }
        .spelling-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--primary); font-size: 16px; text-align: center; outline: none; }

        .action-btn { background: var(--text); color: white; border: none; padding: 12px 40px; border-radius: 25px; font-size: 16px; font-weight: 600; display: none; width: 80%; cursor: pointer; }
        .action-btn.submit-btn { display: inline-block; background: var(--primary); width: 100%; }
        .play-btn { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; display: none; }
        .back-home { margin-top: 15px; background: none; border: none; color: #b2bec3; text-decoration: underline; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="modal-overlay" id="grammarModal">
    <div class="modal-content">
        <button style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer;" onclick="closeGrammarModal()">×</button>
        <div style="font-size:20px; font-weight:800; color:var(--primary); margin-bottom:15px; border-bottom:2px solid #f0f0f0;">📖 文法小抄</div>
        <div id="grammarContent"></div>
    </div>
</div>

<div class="app-container">
    <div id="homeView">
        <div class="header">
            <img src="https://i.imgur.com/rRmXupF.jpeg" alt="Logo" class="logo">
            <div class="header-text">
                <h1>Bon Voyage</h1>
                <p>韓文口說與日常練習</p>
            </div>
        </div>
        
        <button id="modeToggleBtn" class="mode-toggle-btn" onclick="toggleInputMode()">🔄 模式：🗣️ 口說辨識</button>

        <div class="menu-grid">
            <div class="menu-item" style="border: 2px solid var(--primary);" onclick="showScenarioMenu()"><h3>🎭 情境對話</h3><span>➔</span></div>
            <div class="menu-item" onclick="startQuiz('詞彙')"><h3>📚 核心詞彙</h3><span>➔</span></div>
            <div class="menu-item" onclick="startQuiz('文法')"><h3>⚙️ 語法辨析</h3><span>➔</span></div>
            <div class="menu-item" onclick="startQuiz('句型')"><h3>💬 實用長句</h3><span>➔</span></div>
            <div class="menu-item" id="mistakeBtn" onclick="startMistakeQuiz()"><h3>🔥 弱點複習 <span id="mistakeCount" class="mistake-badge">0</span></h3><span>➔</span></div>
        </div>
    </div>

    <div id="quizView">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div class="question-card">
            <div id="catTag" style="font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 10px;"></div>
            <button id="quizGrammarBtn" class="grammar-btn" onclick="openGrammarModal('quiz')">💡 查看文法提示</button>
            <div class="meaning-text" id="targetMeaning"></div>
            <div class="correct-answer" id="targetKorean"></div>
            <button id="repeatBtn" class="play-btn" onclick="playAudio()">🔊 聽正確發音</button>
        </div>
        <div class="feedback-area" id="quizFeedback"></div>
        <div class="controls">
            <div id="quizMicContainer"><button class="mic-btn" id="quizMicBtn">🎤</button></div>
            <div class="spelling-container" id="quizSpellContainer">
                <div class="spelling-hint" id="quizSpellHint"></div>
                <input type="text" id="quizSpellInput" class="spelling-input" placeholder="請輸入韓文...">
                <button class="action-btn submit-btn" onclick="checkSpelling('quiz')">送出答案</button>
            </div>
            <button class="action-btn" id="nextQuizBtn" onclick="nextQuestion()">下一題 ➔</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <div id="scenarioMenuView">
        <div class="header"><h1>選擇對話情境</h1></div>
        <div class="menu-grid" id="scenarioList"></div>
        <button class="back-home" onclick="goHome()">回首頁</button>
    </div>

    <div id="rolePlayView">
        <div class="chat-header" id="rpTitle"></div>
        <div class="task-card">
            <button id="rpGrammarBtn" class="grammar-btn" onclick="openGrammarModal('roleplay')">💡 查看文法提示</button>
            <div class="task-label">📍 輪到你說：</div>
            <div class="task-content" id="rpTaskHint"></div>
        </div>
        <div class="chat-box" id="chatBox"></div>
        <div class="feedback-area" id="rpFeedback"></div>
        <div class="controls">
            <div id="rpMicContainer"><button class="mic-btn" id="rpMicBtn">🎤</button></div>
            <div class="spelling-container" id="rpSpellContainer">
                <div class="spelling-hint" id="rpSpellHint"></div>
                <input type="text" id="rpSpellInput" class="spelling-input" placeholder="請輸入回覆...">
                <button class="action-btn submit-btn" onclick="checkSpelling('roleplay')">送出對話</button>
            </div>
            <button class="action-btn" id="rpNextBtn" onclick="nextRolePlayLine()">繼續對話 ➔</button>
            <button class="action-btn" id="rpFinishBtn" onclick="goHome()">完成對話 🏠</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>
</div>

<script>
    // --- 題庫資料 ---
    const allData = [
        { cat: "詞彙", ko: "퇴직", en: "退休 (官方/合約到期)" },
        { cat: "詞彙", ko: "퇴사", en: "離職 (個人職涯變更)" },
        { cat: "文法", ko: "퇴직할 때", en: "退休的時候", grammarNote: "<b>-(으)ㄹ 때 (表示「當...的時候」)</b><br>動詞字幹沒有收音時，接 -ㄹ 때。" },
        { cat: "文法", ko: "직전이라서", en: "因為是前夕", grammarNote: "<b>(이)라서 (表示原因)</b><br>名詞有收音用 이라서，無收音用 라서。" },
        { cat: "句型", ko: "퇴사 직전이라서 조금 바빠요", en: "因為是離職前夕，所以有點忙。" },
        { cat: "句型", ko: "오랜만의 집이라서 기대돼요", en: "因為是好久沒回去的家，所以很期待。" },
        { cat: "句型", ko: "운동을 한 후에 에너지가 더 좋아졌어요", en: "運動之後，精神變得更好了。" }
    ];

    const scenarios = [
        {
            id: "moving_prep",
            title: "📦 離職與搬家前夕",
            desc: "練習交代最近的忙碌狀態與未來計畫",
            lines: [
                { npcKo: "요즘 많이 바쁘죠? 짐 싸기는 다 끝냈어요?", npcZh: "最近很忙吧？行李都打包完了嗎？", userTaskZh: "因為是離職前夕，所以有點忙。", userKo: "퇴사 직전이라서 조금 바빠요" },
                { npcKo: "그렇군요. 앞으로 계획이 어떻게 돼요?", npcZh: "接下來有什麼計畫呢？", userTaskZh: "父母退休的時候，打算搬回台灣。", userKo: "부모님이 퇴직할 때 대만으로 돌아갈 거예요" },
                { npcKo: "대만 생활이 정말 기대되겠네요!", npcZh: "一定很期待吧！", userTaskZh: "因為是好久沒回去的家，所以很期待。", userKo: "오랜만의 집이라서 기대돼요" }
            ]
        }
    ];

    let currentSet = [], idx = 0, mistakeBank = [], currentScenario = null, currentLineIdx = 0, inputMode = 'voice';
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ko-KR';

    // --- 🌟 關鍵修正：90% 高標準容錯門檻 ---
    function checkSimilarity(input, target) {
        const clean = s => s.replace(/[\s.,?!]/g, "");
        const s1 = clean(input), s2 = clean(target);
        if (s1 === s2) return 1.0;
        
        let matches = 0;
        const used = new Array(s2.length).fill(false);
        for (let i = 0; i < s1.length; i++) {
            for (let j = 0; j < s2.length; j++) {
                if (!used[j] && s1[i] === s2[j]) { matches++; used[j] = true; break; }
            }
        }
        return matches / Math.max(s1.length, s2.length);
    }

    // --- 精準的 LCS Diff 比對 ---
    function generateDiffHtml(input, target) {
        const m = input.length, n = target.length;
        const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
        for (let i = 1; i <= m; i++) {
            for (let j = 1; j <= n; j++) {
                if (input[i - 1] === target[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
                else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }
        let i = m, j = n, res = "";
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && input[i - 1] === target[j - 1]) {
                res = input[i - 1] + res; i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                j--;
            } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                res = `<span class="typo-highlight">${input[i - 1]}</span>` + res; i--;
            }
        }
        return res;
    }

    // --- 介面控制與初始化 ---
    function openGrammarModal(mode) {
        const note = (mode === 'quiz') ? currentSet[idx].grammarNote : currentScenario.lines[currentLineIdx].grammarNote;
        if (note) { document.getElementById('grammarContent').innerHTML = note; document.getElementById('grammarModal').style.display = 'flex'; }
    }
    function closeGrammarModal() { document.getElementById('grammarModal').style.display = 'none'; }

    function toggleInputMode() {
        inputMode = (inputMode === 'voice') ? 'spelling' : 'voice';
        document.getElementById('modeToggleBtn').innerText = (inputMode === 'voice') ? '🔄 模式：🗣️ 口說辨識' : '🔄 模式：⌨️ 鍵盤拼字';
        if (document.getElementById('quizView').style.display === 'flex') setupInputUI('quiz');
        else if (document.getElementById('rolePlayView').style.display === 'flex') setupInputUI('rp');
    }

    function setupInputUI(prefix) {
        const isVoice = (inputMode === 'voice');
        document.getElementById(`${prefix}MicContainer`).style.display = isVoice ? 'flex' : 'none';
        document.getElementById(`${prefix}SpellContainer`).style.display = isVoice ? 'none' : 'flex';
        document.getElementById(prefix === 'quiz' ? 'nextQuizBtn' : 'rpNextBtn').style.display = 'none';
        if (!isVoice) { 
            const input = document.getElementById(`${prefix}SpellInput`);
            input.value = ""; 
            setTimeout(() => { input.focus(); input.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }
    }

    function processAnswer(inputRaw, mode) {
        const target = (mode === 'quiz') ? currentSet[idx].ko : currentScenario.lines[currentLineIdx].userKo;
        const score = checkSimilarity(inputRaw, target);
        const feedback = document.getElementById(mode === 'quiz' ? 'quizFeedback' : 'rpFeedback');

        if (score >= 0.9) { // 🌟 要求精準發音，90% 才通關
            feedback.innerHTML = "✅ 通關！";
            feedback.style.color = "var(--success)";
            if (mode === 'quiz') {
                document.getElementById('targetKorean').style.visibility = 'visible';
                document.getElementById('quizMicContainer').style.display = 'none';
                document.getElementById('quizSpellContainer').style.display = 'none';
                document.getElementById('nextQuizBtn').style.display = 'inline-block';
                document.getElementById('repeatBtn').style.display = 'block';
            } else {
                addChatBubble(inputRaw, 'player');
                document.getElementById('rpMicContainer').style.display = 'none';
                document.getElementById('rpSpellContainer').style.display = 'none';
                document.getElementById('rpNextBtn').style.display = 'inline-block';
            }
        } else {
            const diff = generateDiffHtml(inputRaw, target);
            feedback.innerHTML = `<span style="color:var(--error);">❌ 聽起來像：</span><br><div style="font-size:18px; font-weight:700;">"${diff}"</div>`;
            if (mode === 'quiz') {
                document.getElementById('targetKorean').style.visibility = 'visible';
                document.getElementById('repeatBtn').style.display = 'block';
                if (!mistakeBank.some(m => m.ko === target)) mistakeBank.push(currentSet[idx]);
            }
            speak(target);
        }
    }

    // --- 其他功能 (語音、導航) ---
    function playAudio() { speak(document.getElementById('targetKorean').innerText); }
    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ko-KR'; utter.rate = 0.85;
        window.speechSynthesis.speak(utter);
    }
    function hideAllViews() { ['homeView', 'quizView', 'scenarioMenuView', 'rolePlayView'].forEach(id => { document.getElementById(id).style.display = 'none'; }); }
    function goHome() { 
        hideAllViews(); document.getElementById('homeView').style.display = 'block'; 
        const mBtn = document.getElementById('mistakeBtn');
        if (mistakeBank.length > 0) { mBtn.style.display = 'flex'; document.getElementById('mistakeCount').innerText = mistakeBank.length; }
    }
    function startQuiz(type) {
        recognitionMode = 'quiz';
        currentSet = (type === '全部') ? [...allData] : allData.filter(q => q.cat === type);
        currentSet.sort(() => Math.random() - 0.5); idx = 0;
        hideAllViews(); document.getElementById('quizView').style.display = 'flex'; showQuizQuestion();
    }
    function startMistakeQuiz() {
        if (mistakeBank.length === 0) return;
        recognitionMode = 'quiz'; currentSet = [...mistakeBank]; mistakeBank = [];
        hideAllViews(); document.getElementById('quizView').style.display = 'flex'; showQuizQuestion();
    }
    function showQuizQuestion() {
        const q = currentSet[idx];
        document.getElementById('catTag').innerText = q.cat;
        document.getElementById('targetMeaning').innerText = q.en;
        document.getElementById('targetKorean').innerText = q.ko;
        document.getElementById('targetKorean').style.visibility = 'hidden';
        document.getElementById('quizFeedback').innerHTML = "";
        document.getElementById('progressFill').style.width = `${((idx) / currentSet.length) * 100}%`;
        document.getElementById('quizGrammarBtn').style.display = q.grammarNote ? 'inline-block' : 'none';
        document.getElementById('quizSpellHint').innerText = "✏️ 翻譯：" + q.en;
        setupInputUI('quiz');
    }
    function nextQuestion() { idx++; if (idx < currentSet.length) showQuizQuestion(); else goHome(); }
    function showScenarioMenu() {
        hideAllViews(); document.getElementById('scenarioMenuView').style.display = 'flex';
        const list = document.getElementById('scenarioList'); list.innerHTML = '';
        scenarios.forEach((s, i) => {
            const div = document.createElement('div'); div.className = 'menu-item'; div.onclick = () => startRolePlay(i);
            div.innerHTML = `<div><h3>${s.title}</h3><p style="font-size:12px;color:#666;">${s.desc}</p></div><span>➔</span>`;
            list.appendChild(div);
        });
    }
    function startRolePlay(i) {
        currentScenario = scenarios[i]; currentLineIdx = 0; hideAllViews();
        document.getElementById('rolePlayView').style.display = 'flex';
        document.getElementById('rpTitle').innerText = currentScenario.title; document.getElementById('chatBox').innerHTML = '';
        playCurrentNpcLine();
    }
    function playCurrentNpcLine() {
        const line = currentScenario.lines[currentLineIdx];
        addChatBubble(line.npcKo + `<div class="hint">${line.npcZh}</div>`, 'npc');
        speak(line.npcKo);
        document.getElementById('rpTaskHint').innerText = line.userTaskZh;
        document.getElementById('rpFeedback').innerHTML = "";
        document.getElementById('rpGrammarBtn').style.display = line.grammarNote ? 'inline-block' : 'none';
        document.getElementById('rpSpellHint').innerText = "✏️ 請說：" + line.userTaskZh;
        setupInputUI('rp');
    }
    function nextRolePlayLine() {
        currentLineIdx++; if (currentLineIdx < currentScenario.lines.length) playCurrentNpcLine();
        else document.getElementById('rpFinishBtn').style.display = 'inline-block';
    }
    function addChatBubble(text, type) {
        const box = document.getElementById('chatBox');
        const b = document.createElement('div'); b.className = `bubble ${type}`; b.innerHTML = text;
        box.appendChild(b); box.scrollTop = box.scrollHeight;
    }
    function checkSpelling(mode) {
        const input = document.getElementById(mode === 'quiz' ? 'quizSpellInput' : 'rpSpellInput');
        if (input.value.trim()) processAnswer(input.value.trim(), mode);
    }
    document.getElementById('quizMicBtn').onclick = () => { recognitionMode = 'quiz'; recognition.start(); document.getElementById('quizMicBtn').classList.add('recording'); };
    document.getElementById('rpMicBtn').onclick = () => { recognitionMode = 'roleplay'; recognition.start(); document.getElementById('rpMicBtn').classList.add('recording'); };
    recognition.onresult = (e) => {
        const res = e.results[0][0].transcript;
        document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('recording'));
        processAnswer(res, recognitionMode);
    };
    recognition.onerror = () => document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('recording'));
</script>
</body>
</html>
