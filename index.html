<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sue's Korean Hub</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --error: #eb4d4b;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3436;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; justify-content: center;
        }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; position: relative; padding: 20px; }
        
        /* Home View Styles */
        #homeView { padding-top: 40px; }
        .header { text-align: left; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin: 0; color: var(--primary); }
        .header p { color: #636e72; margin: 5px 0 0; }
        .menu-grid { display: grid; gap: 15px; }
        .menu-item {
            background: var(--card); padding: 25px; border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); cursor: pointer;
            transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-item:active { transform: scale(0.97); }
        .menu-item h3 { margin: 0; font-size: 18px; }
        .menu-item .icon { font-size: 24px; }

        /* Quiz View Styles */
        #quizView { display: none; padding-top: 20px; text-align: center; }
        .progress-bar { width: 100%; height: 6px; background: #dfe6e9; border-radius: 3px; margin-bottom: 40px; }
        #progressFill { width: 0%; height: 100%; background: var(--primary); border-radius: 3px; transition: 0.3s; }
        
        .question-card { min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .meaning-text { font-size: 24px; font-weight: 700; color: #636e72; margin-bottom: 10px; }
        .correct-answer { font-size: 36px; font-weight: 800; color: var(--primary); margin-top: 10px; visibility: hidden; }
        
        .feedback-area { min-height: 60px; margin: 20px 0; font-weight: 600; font-size: 16px; }
        
        /* Professional Large Mic Button */
        .controls { position: absolute; bottom: 50px; left: 0; right: 0; text-align: center; }
        .mic-btn-container { position: relative; display: inline-block; }
        #micBtn {
            width: 90px; height: 90px; border-radius: 50%; background: var(--primary);
            border: none; color: white; font-size: 32px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.4); z-index: 2; position: relative;
        }
        #micBtn.recording { background: var(--error); animation: pulse 1.5s infinite; }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0.4); } 
            70% { box-shadow: 0 0 0 20px rgba(235, 77, 75, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); } 
        }

        #nextBtn {
            background: var(--text); color: white; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 600; display: none; margin: 0 auto;
        }
        .play-btn { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; display: none; font-size: 14px; font-weight: 600; }
        .back-home { margin-top: 30px; background: none; border: none; color: #b2bec3; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="homeView">
        <div class="header">
            <h1>Sue 的韓文學習中心</h1>
            <p>專注於口說與日常應用</p>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="startQuiz('詞彙')">
                <h3>📚 核心詞彙</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('文法')">
                <h3>⚙️ 語法辨析</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('句型')">
                <h3>💬 生活句型</h3><span class="icon">➔</span>
            </div>
            <div class="menu-item" onclick="startQuiz('全部')">
                <h3>🎲 全部挑戰</h3><span class="icon">➔</span>
            </div>
        </div>
    </div>

    <div id="quizView">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div class="question-card">
            <div id="catTag" style="font-size: 14px; color: var(--primary); margin-bottom: 8px; font-weight: 600;"></div>
            <div class="meaning-text" id="targetMeaning">準備好...</div>
            <div class="correct-answer" id="targetKorean"></div>
            <button id="repeatBtn" class="play-btn" onclick="playAudio()">🔊 重聽讀音</button>
        </div>

        <div class="feedback-area" id="feedback"></div>

        <div class="controls">
            <div class="mic-btn-container">
                <button id="micBtn">🎤</button>
            </div>
            <button id="nextBtn" onclick="nextQuestion()">下一題 ➔</button>
            <br>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>
</div>

<script>
    const allData = [
        { cat: "詞彙", ko: "퇴직", en: "Official - Retire (expired)" },
        { cat: "詞彙", ko: "퇴사", en: "Personal - Leave job (career change)" },
        { cat: "詞彙", ko: "퇴근", en: "Finish work for today" },
        { cat: "詞彙", ko: "옮기다", en: "To move (something/company)" },
        { cat: "詞彙", ko: "적다", en: "To write something down" },
        { cat: "詞彙", ko: "맛있는 음식", en: "Delicious food" },
        { cat: "詞彙", ko: "먹기", en: "Eating (Noun form)" },
        { cat: "文法", ko: "해야 돼요", en: "Must / Have to" },
        { cat: "文法", ko: "해도 돼요", en: "Can / It's okay to" },
        { cat: "文法", ko: "하면 안 돼요", en: "Must not / Cannot" },
        { cat: "文法", ko: "해볼게요", en: "Let me try" },
        { cat: "句型", ko: "곧 퇴사해서 안 바빠요", en: "Quitting soon, so not busy" },
        { cat: "句型", ko: "부모님이 퇴직할 때 대만으로 회사를 옮기니까 잘 됐어요", en: "Moving to Taiwan as parents retire" },
        { cat: "句型", ko: "새로운 公司에 가면 시간이 많은데 뭐 하고 싶어요", en: "What to do with more time at new job?" }
    ];

    let currentSet = [];
    let idx = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ko-KR';
    recognition.continuous = false;

    function playAudio(text) {
        const target = text || allData.find(q => q.ko === document.getElementById('targetKorean').innerText)?.ko;
        if (!target) return;
        window.speechSynthesis.cancel(); // 停止目前的播放
        const utter = new SpeechSynthesisUtterance(target);
        utter.lang = 'ko-KR';
        utter.rate = 0.85;
        window.speechSynthesis.speak(utter);
    }

    function startQuiz(type) {
        currentSet = (type === '全部') ? [...allData] : allData.filter(q => q.cat === type);
        currentSet.sort(() => Math.random() - 0.5);
        idx = 0;
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('quizView').style.display = 'block';
        showCurrent();
    }

    function showCurrent() {
        const q = currentSet[idx];
        document.getElementById('catTag').innerText = q.cat;
        document.getElementById('targetMeaning').innerText = q.en;
        document.getElementById('targetKorean').innerText = q.ko;
        document.getElementById('targetKorean').style.visibility = 'hidden';
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.color = 'inherit';
        document.getElementById('progressFill').style.width = `${((idx + 1) / currentSet.length) * 100}%`;
        document.getElementById('micBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('repeatBtn').style.display = 'none';
    }

    document.getElementById('micBtn').addEventListener('click', () => {
        recognition.start();
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('feedback').innerText = "正在聆聽你的發音...";
    });

    recognition.onresult = (event) => {
        const result = event.results[0][0].transcript.trim();
        const target = currentSet[idx].ko.replace(/[\s.,?!]/g, "");
        const input = result.replace(/[\s.,?!]/g, "");
        
        document.getElementById('micBtn').classList.remove('recording');

        if (input === target) {
            document.getElementById('feedback').innerText = `✅ 完美！你說了 "${result}"`;
            document.getElementById('feedback').style.color = 'var(--success)';
            document.getElementById('targetKorean').style.visibility = 'visible';
            document.getElementById('micBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        } else {
            document.getElementById('feedback').innerText = `❌ 聽起來像是 "${result}"，再試一次或聽讀音`;
            document.getElementById('feedback').style.color = 'var(--error)';
            document.getElementById('targetKorean').style.visibility = 'visible'; // 答錯也顯示正確答案
            document.getElementById('repeatBtn').style.display = 'inline-block';
            playAudio(currentSet[idx].ko); // 自動播放讀音
        }
    };

    recognition.onerror = () => {
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('feedback').innerText = "沒聽清楚，請點擊按鈕重試。";
    };

    function nextQuestion() {
        idx++;
        if (idx < currentSet.length) showCurrent();
        else { alert("太棒了！練習完成！"); goHome(); }
    }

    function goHome() {
        document.getElementById('homeView').style.display = 'block';
        document.getElementById('quizView').style.display = 'none';
    }
</script>
</body>
</html>
