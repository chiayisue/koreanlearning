<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sue 的韓文學習中心</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        /* 首頁樣式 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .menu-btn {
            background: white;
            border: 2px solid #eee;
            padding: 20px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            font-size: 16px;
        }
        .menu-btn:hover { border-color: var(--primary); color: var(--primary); }
        
        /* 練習區樣式 */
        .quiz-view { display: none; }
        .category-tag {
            display: inline-block;
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        .meaning { font-size: 26px; font-weight: 700; color: #333; margin: 25px 0; min-height: 70px; }
        .korean-text { font-size: 34px; font-weight: 800; color: var(--primary); margin-bottom: 30px; visibility: hidden; }
        
        .action-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #micBtn { background: var(--success); color: white; }
        #nextBtn { background: var(--primary); color: white; display: none; }
        .back-btn { background: none; color: #888; border: none; font-size: 14px; cursor: pointer; margin-top: 20px; }
        
        #result { font-size: 16px; margin: 20px 0; min-height: 24px; }
        .success-text { color: var(--success); font-weight: bold; }
        .error-text { color: var(--error); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="homeView" class="card">
        <h1 style="margin-bottom: 10px;">👋 韓文學習中心</h1>
        <p style="color: #666;">選擇你想練習的單元</p>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startQuiz('詞彙')">📚 核心詞彙</button>
            <button class="menu-btn" onclick="startQuiz('文法')">⚙️ 語法辨析</button>
            <button class="menu-btn" onclick="startQuiz('句型')">💬 生活句型</button>
            <button class="menu-btn" onclick="startQuiz('全部')">🎲 全部隨機</button>
        </div>
    </div>

    <div id="quizView" class="card quiz-view">
        <div id="categoryLabel" class="category-tag">分類</div>
        <div class="meaning" id="displayMeaning">載入中...</div>
        <div class="korean-text" id="displayKorean">答案</div>
        
        <div id="result">等待錄音...</div>
        
        <button id="micBtn">🎤 按住開始回答</button>
        <button id="nextBtn">下一題 ➔</button>
        <br>
        <button class="back-btn" onclick="goHome()">🏠 返回首頁</button>
    </div>
</div>

<script>
    // 整合自筆記 Sue #4 Whiteboard 的完整題庫 
    const allQuestions = [
        { cat: "詞彙", ko: "퇴직", en: "Retire (Official/Expired)" },
        { cat: "詞彙", ko: "퇴사", en: "Leave company (Personal/Career)" },
        { cat: "詞彙", ko: "퇴근", en: "Off work (Finished today)" },
        { cat: "詞彙", ko: "옮기다", en: "To move (something/company)" },
        { cat: "詞彙", ko: "적다", en: "Writing something" },
        { cat: "詞彙", ko: "맛있는 음식", en: "Delicious food (Adj form)" },
        { cat: "詞彙", ko: "재미있는 공연", en: "Interesting performance" },
        { cat: "詞彙", ko: "먹기", en: "Eating (Noun form)" },
        { cat: "詞彙", ko: "살기", en: "Living (Noun form)" },
        
        { cat: "文法", ko: "해야 돼요", en: "Must / Have to" },
        { cat: "文法", ko: "해도 돼요", en: "Can / It's okay to" },
        { cat: "文法", ko: "하면 안 돼요", en: "Must not / Cannot" },
        { cat: "文法", ko: "하면 돼요", en: "You just need to do it" },
        { cat: "文法", ko: "해볼게요", en: "Let me try / I'll try" },

        { cat: "句型", ko: "곧 퇴사해서 안 바빠요", en: "Soon quitting, so not busy" },
        { cat: "句型", ko: "무슨 뜻이에요", en: "What does it mean?" },
        { cat: "句型", ko: "부모님이 퇴직할 때 대만으로 회사를 옮기니까 잘 됐어요", en: "Parents retiring & moving to Taiwan, so it's good" },
        { cat: "句型", ko: "새로운 회사에 가면 시간이 많은데 뭐 하고 싶어요", en: "If time permits in new job, what to do?" }
    ];

    let currentQuizSet = [];
    let currentIndex = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ko-KR';

    const synth = window.speechSynthesis;

    // 路由控制
    function startQuiz(category) {
        currentQuizSet = (category === '全部') 
            ? [...allQuestions].sort(() => Math.random() - 0.5)
            : allQuestions.filter(q => q.cat === category).sort(() => Math.random() - 0.5);
        
        currentIndex = 0;
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('quizView').style.display = 'block';
        showQuestion();
    }

    function goHome() {
        document.getElementById('homeView').style.display = 'block';
        document.getElementById('quizView').style.display = 'none';
    }

    // 朗讀功能
    function speakKorean(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ko-KR';
        utter.rate = 0.8; // 稍微慢一點方便學習
        synth.speak(utter);
    }

    function showQuestion() {
        const q = currentQuizSet[currentIndex];
        document.getElementById('categoryLabel').innerText = q.cat;
        document.getElementById('displayMeaning').innerText = q.en;
        document.getElementById('displayKorean').innerText = q.ko;
        document.getElementById('displayKorean').style.visibility = 'hidden';
        document.getElementById('result').innerText = "準備好了嗎？";
        document.getElementById('result').className = "";
        document.getElementById('micBtn').style.display = 'block';
        document.getElementById('nextBtn').style.display = 'none';
    }

    document.getElementById('micBtn').addEventListener('click', () => {
        recognition.start();
        document.getElementById('micBtn').innerText = "🔴 正在聆聽...";
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.trim();
        const target = currentQuizSet[currentIndex].ko.replace(/[\s.,?!]/g, "");
        const input = transcript.replace(/[\s.,?!]/g, "");
        
        document.getElementById('micBtn').innerText = "🎤 按住開始回答";

        if (input === target) {
            document.getElementById('result').innerHTML = `✅ 答對了！<br>你說：${transcript}`;
            document.getElementById('result').className = "success-text";
            document.getElementById('displayKorean').style.visibility = 'visible';
            document.getElementById('micBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        } else {
            document.getElementById('result').innerHTML = `❌ 聽起來像是：${transcript}<br>聽聽正確讀音...`;
            document.getElementById('result').className = "error-text";
            // 自動播放正確朗讀
            speakKorean(currentQuizSet[currentIndex].ko);
        }
    };

    document.getElementById('nextBtn').addEventListener('click', () => {
        currentIndex++;
        if (currentIndex < currentQuizSet.length) {
            showQuestion();
        } else {
            alert("本單元練習完成！");
            goHome();
        }
    });
</script>

</body>
</html>
